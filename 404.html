<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Not found — Doppio</title>
<meta name="theme-color" content="#0f1a24">
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(180deg,#0f1a24 0%,#0b141b 100%);color:#eaf1f5;font:17px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.box{padding:24px}
.dot{display:inline-block;width:12px;height:12px;border-radius:50%;background:#b5fa17;box-shadow:0 0 14px rgba(181,250,23,.7);margin-bottom:18px}
h1{font-size:30px;color:#fff;margin:.2em 0}
p{color:#9bb0bd}
a{color:#b5fa17;text-decoration:none;font-weight:700}a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="box">
  <div class="dot"></div>
  <h1>Page not found</h1>
  <p>Try the <a href="/">home page</a>, <a href="/privacy">privacy policy</a>, or <a href="/support">support</a>.</p>
</div>
</body>
</html>
